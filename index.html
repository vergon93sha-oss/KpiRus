<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Tracker: Ввод и Отчет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%); min-height: 100vh; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-g { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; color: white; padding: 6px; width: 100%; font-size: 12px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #60a5fa; font-weight: bold; }
        .cloud-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; }
        .cloud { position: absolute; font-size: 3rem; opacity: 0.2; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateX(-10vw); } to { transform: translateX(110vw); } }
        tr:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4">
    <div class="cloud-container">
        <div class="cloud" style="top: 10%; animation-duration: 50s;">☁️</div>
        <div class="cloud" style="top: 40%; animation-duration: 80s;">☁️</div>
        <div class="cloud" style="top: 70%; animation-duration: 65s;">☁️</div>
    </div>

    <div class="max-w-7xl mx-auto glass rounded-2xl p-6 shadow-2xl relative z-10">
        <h1 class="text-lg font-light text-center mb-6 uppercase tracking-widest text-blue-200">ИТОГ РАСЧЕТА ПО ЗАДАЧАМ И KPI Бизнес ассистента руководителя</h1>
        
        <div class="flex justify-center gap-6 mb-6">
            <div id="tab1" class="tab-btn active" onclick="showTab(1)">ВВОД</div>
            <div id="tab2" class="tab-btn" onclick="showTab(2)">ОТЧЕТ</div>
        </div>

        <div id="content1" class="space-y-3 max-w-xl mx-auto">
            <input type="date" id="dateInput" class="input-g">
            <select id="taskSelect" class="input-g" onchange="updateKPI()"></select>
            <input type="text" id="descInput" placeholder="Конкретное поручение..." class="input-g">
            <input type="text" id="commentInput" placeholder="Ваш комментарий..." class="input-g">
            <input type="text" id="kpiDisplay" readonly class="input-g bg-blue-900/30" placeholder="KPI (авто)">
            <button onclick="addTask()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold transition">ДОБАВИТЬ ЗАДАЧУ</button>
        </div>

        <div id="content2" class="hidden">
            <input type="month" id="monthFilter" class="input-g mb-3 max-w-[200px]" onchange="renderTable()">
            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-left border-collapse">
                    <thead class="text-blue-300 uppercase">
                        <tr><th class="p-2">Дата</th><th class="p-2">Поручение и KPI</th><th class="p-2">Коммент</th><th class="p-2">Статус</th><th class="p-2">Ссылка</th><th class="p-2">ОЦЕНКА ДИРЕКТОРА</th><th class="p-2">КОЭФФИЦИЕНТ</th><th class="p-2">Сумма</th></tr>
                    </thead>
                    <tbody id="taskBody"></tbody>
                </table>
            </div>
            <div class="mt-6 flex flex-wrap justify-end gap-6 items-center glass p-4 rounded-xl text-sm">
                <div>Аванс: <input type="number" id="advanceInput" value="0" class="input-g w-24" onchange="renderTable()"></div>
                <div class="font-bold">Итого: <span id="totalSum">0</span> руб.</div>
                <div class="text-green-400 font-black">К ВЫПЛАТЕ: <span id="finalPay">0</span> руб.</div>
            </div>
        </div>
    </div>

    <script>
        const TASKS = [
            {n: "Ведение, систематизация и технический перенос баз данных, реестров договоров и электронного архива документов.", k: "К2"},
            {n: "Организация деловых встреч, ведение протоколов переговоров и контроль исполнения поручений.", k: "К3"},
            {n: "Взаимодействие со смежными подразделениями (логистика, бухгалтерия, склад) по внутренним вопросам.", k: "К4"},
            {n: "Подготовка аналитических данных, регулярной отчетности и презентаций.", k: "К3"},
            {n: "Подготовка документооборота отчетов планов работ графиков для производства.", k: "К2"},
            {n: "Ведение деловой переписки и коммуникация с клиентами через email, мессенджеры и CRM-систему.", k: "К2"},
            {n: "Обработка входящих запросов, контроль исполнения заказов и соблюдения сроков обязательств перед клиентами.", k: "К1"},
            {n: "Работа с рекламациями, претензиями, урегулирование спорных ситуаций и обновление базы контактов.", k: "К2"},
            {n: "Подготовка коммерческих предложений и дополнительных сервисов для постоянных клиентов.", k: "К6"},
            {n: "Координация работы внешних подрядчиков и контроль выполнения ими поставленных задач.", k: "К1"},
            {n: "Работа с ИИ: помощь в разработке новых продуктов, презентаций, отчетов, документов, рецептур.", k: "К5"},
            {n: "Формирование и регистрация карточек товаров с присвоением кодов GTIN в GS1 и системе «Честный ЗНАК».", k: "К2"},
            {n: "Разработка дизайна, актуализация прейскурантов и макетов этикеток в специализированном ПО (BarTender).", k: "К5"},
            {n: "Разработка, запись, монтаж и оформление обучающих видеоматериалов, видеоинструкции и скринкастов.", k: "К5"}
        ];
        
        const sel = document.getElementById('taskSelect');
        TASKS.forEach(t => sel.innerHTML += `<option value="${t.n}|${t.k}">${t.n}</option>`);

        function updateKPI() { document.getElementById('kpiDisplay').value = sel.value.split('|')[1]; }
        updateKPI();

        function showTab(n) {
            document.getElementById('content1').classList.toggle('hidden', n !== 1);
            document.getElementById('content2').classList.toggle('hidden', n !== 2);
            document.getElementById('tab1').classList.toggle('active', n === 1);
            document.getElementById('tab2').classList.toggle('active', n === 2);
            if(n === 2) renderTable();
        }

        function addTask() {
            let [n, k] = sel.value.split('|');
            let d = JSON.parse(localStorage.getItem('myTasks') || '[]');
            d.push({ id: Date.now(), date: document.getElementById('dateInput').value || new Date().toISOString().split('T')[0], n, k, desc: document.getElementById('descInput').value, comment: document.getElementById('commentInput').value, status: 'Выполнено', res: 'Хорошо', cf: 1, sm: 0, url: '' });
            localStorage.setItem('myTasks', JSON.stringify(d));
            alert('Задача добавлена!');
        }

        function renderTable() {
            let f = document.getElementById('monthFilter').value;
            let d = JSON.parse(localStorage.getItem('myTasks') || '[]');
            let adv = Number(document.getElementById('advanceInput').value);
            let b = document.getElementById('taskBody');
            b.innerHTML = '';
            let tot = 0;
            d.filter(i => i.date.startsWith(f)).forEach(i => {
                tot += Number(i.sm);
                let linkHtml = i.url ? `<a href="${i.url.startsWith('http')?i.url:'https://'+i.url}" target="_blank" class="text-blue-400 hover:text-white text-lg">↗</a>` : '';
                b.innerHTML += `<tr>
                    <td class="p-2 whitespace-nowrap">${i.date}</td>
                    <td class="p-2"><div class="font-bold text-white max-w-[180px]">${i.desc}</div><div class="text-[9px] text-blue-400 mt-1">${i.k} | ${i.n}</div></td>
                    <td class="p-2 max-w-[120px]">${i.comment}</td>
                    <td class="p-2"><select onchange="up(this, ${i.id}, 'status')" class="input-g p-0.5 text-[9px]"><option ${i.status=='Выполнено'?'selected':''}>Выполнено</option><option ${i.status=='В работе'?'selected':''}>В работе</option><option ${i.status=='Ожидаю информации'?'selected':''}>Ожидаю информации</option></select></td>
                    <td class="p-2 flex items-center gap-2"><input type="text" class="input-g p-0.5 w-12" value="${i.url||''}" onchange="up(this, ${i.id}, 'url')">${linkHtml}</td>
                    <td class="p-2"><select onchange="up(this, ${i.id}, 'res')" class="input-g p-0.5 text-[9px]"><option ${i.res=='Хорошо'?'selected':''}>Хорошо</option><option ${i.res=='Замечания'?'selected':''}>Замечания</option></select></td>
                    <td class="p-2"><input type="number" class="input-g p-0.5 w-10" value="${i.cf}" onchange="up(this, ${i.id}, 'cf')"></td>
                    <td class="p-2"><input type="number" class="input-g p-0.5 w-16" value="${i.sm}" onchange="up(this, ${i.id}, 'sm')"></td>
                </tr>`;
            });
            document.getElementById('totalSum').innerText = tot;
            document.getElementById('finalPay').innerText = (tot - adv);
        }

        function up(el, id, f) {
            let d = JSON.parse(localStorage.getItem('myTasks'));
            let item = d.find(i => i.id == id);
            item[f] = (f === 'sm' || f === 'cf') ? Number(el.value) : el.value;
            localStorage.setItem('myTasks', JSON.stringify(d));
            if(f==='sm') renderTable();
        }

        document.getElementById('monthFilter').value = new Date().toISOString().slice(0, 7);
    </script>
</body>
</html>
